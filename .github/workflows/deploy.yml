name: Deploy WordPress

on:
  push:
    branches:
      - main

jobs:
  package-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package WordPress files
  	run: |
    	 tar --exclude='.git' \
             --exclude='.github' \
      	     --exclude='wp-config.php' \
             --exclude='wp-content/uploads' \
             --exclude='.env' \
             --exclude='.env.*' \
             --exclude='wordpress-package.tar.gz' \
             -czf wordpress-package.tar.gz .

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: wordpress-package
          path: wordpress-package.tar.gz

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/wordpress-key
          chmod 600 ~/.ssh/wordpress-key

          cat > ~/.ssh/config <<EOF
          Host bastion
            HostName ${{ secrets.BASTION_HOST }}
            User ubuntu
            Port 2222
            IdentityFile ~/.ssh/wordpress-key
            StrictHostKeyChecking no

          Host privateec2
            HostName ${{ secrets.PRIVATE_HOST }}
            User ubuntu
            Port 2222
            IdentityFile ~/.ssh/wordpress-key
            ProxyJump bastion
            StrictHostKeyChecking no
          EOF

      - name: Test SSH connectivity
        run: |
          ssh bastion "echo Bastion OK"
          ssh privateec2 "echo Private EC2 OK"

      - name: Deploy only changed files with rsync
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='wp-config.php' \
            --exclude='wp-content/uploads/' \
            --exclude='.env' \
            --exclude='.env.*' \
            -e "ssh privateec2" \
            ./ privateec2:/var/www/html/

      - name: Fix permissions and restart Apache
        run: |
          ssh privateec2 << 'EOF'
            sudo chown -R www-data:www-data /var/www/html
            sudo find /var/www/html -type d -exec chmod 755 {} \;
            sudo find /var/www/html -type f -exec chmod 644 {} \;
            sudo systemctl restart apache2
          EOF